task:
  name: "prepare-single-iceberg-aging-task"
  description: "Create Iceberg demo table and load test rows for the aging example"
  version: "1.0.0"

execution:
  runtime-mode: BATCH

computation:
  sql:
    yaml-file: "sql/sql.yaml"

spark:
  sql:
    shuffle-partitions: 2
  driver:
    memory: "1g"
    cores: 1
  executor:
    memory: "1g"
    cores: 1
    instances: 2
  dynamicAllocation:
    enabled: false
  config:
    spark.sql.adaptive.enabled: "true"
    spark.sql.adaptive.coalescePartitions.enabled: "true"
    spark.sql.extensions: "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
    spark.sql.catalog.iceberg_hdfs: "org.apache.iceberg.spark.SparkCatalog"
    spark.sql.catalog.iceberg_hdfs.type: "hadoop"
    spark.sql.catalog.iceberg_hdfs.warehouse: "hdfs:///tmp/taskplugin/single-iceberg-aging-task/warehouse"

udfs: []
